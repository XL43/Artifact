name: Build and Release Artifact

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  JUCE_VERSION: "8.0.10"

jobs:
  # ── Windows Build ────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows VST3
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache JUCE
        uses: actions/cache@v4
        id: cache-juce
        with:
          path: C:\JUCE
          key: juce-${{ env.JUCE_VERSION }}-windows

      - name: Download and extract JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/juce-framework/JUCE/releases/download/${{ env.JUCE_VERSION }}/juce-${{ env.JUCE_VERSION }}-windows.zip"
          Invoke-WebRequest -Uri $url -OutFile juce.zip
          Expand-Archive juce.zip -DestinationPath C:\juce_extract
          $extracted = Get-ChildItem C:\juce_extract | Select-Object -First 1
          Move-Item $extracted.FullName C:\JUCE

      - name: Build Projucer
        shell: pwsh
        run: |
          msbuild C:\JUCE\extras\Projucer\Builds\VisualStudio2022\Projucer.sln `
            /p:Configuration=Release /p:Platform=x64 -maxcpucount

      - name: Resave project and list generated folders
        shell: pwsh
        run: |
          $projucer = "C:\JUCE\extras\Projucer\Builds\VisualStudio2022\x64\Release\App\Projucer.exe"
          & $projucer --resave "${{ github.workspace }}\Artifact.jucer"
          Write-Host "=== Builds folder contents ==="
          Get-ChildItem "${{ github.workspace }}\Builds" -ErrorAction SilentlyContinue

      - name: Build VST3 Release
        shell: pwsh
        run: |
          # Find the generated solution — works regardless of VS version in jucer
          $sln = Get-ChildItem "${{ github.workspace }}\Builds" -Recurse -Filter "*.sln" | Select-Object -First 1
          Write-Host "Building: $($sln.FullName)"
          msbuild $sln.FullName /p:Configuration=Release /p:Platform=x64 -maxcpucount

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          # Find the VST3 output folder
          $vst3 = Get-ChildItem "${{ github.workspace }}\Builds" -Recurse -Filter "Artifact.vst3" -Directory | Select-Object -First 1
          Write-Host "VST3 found at: $($vst3.FullName)"
          $buildDir = $vst3.Parent.Parent.FullName
          Write-Host "Build dir: $buildDir"

          $issPath = "${{ github.workspace }}\installer\Artifact_Windows_Installer.iss"
          $content = Get-Content $issPath -Raw
          $content = $content -replace '#define SourceDir.*', "#define SourceDir `"$buildDir`""
          $content | Set-Content $issPath

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" $issPath

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: "${{ github.workspace }}\\installer\\Output\\*.exe"
          if-no-files-found: warn

  # ── macOS Build ──────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS VST3 + AU
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache JUCE
        uses: actions/cache@v4
        id: cache-juce
        with:
          path: ~/JUCE
          key: juce-${{ env.JUCE_VERSION }}-macos

      - name: Download and extract JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L "https://github.com/juce-framework/JUCE/releases/download/${{ env.JUCE_VERSION }}/juce-${{ env.JUCE_VERSION }}-osx.zip" -o juce.zip
          unzip juce.zip -d ~/juce_extract
          extracted=$(ls ~/juce_extract | head -1)
          mv ~/juce_extract/"$extracted" ~/JUCE

      - name: Resave project and list generated folders
        run: |
          ~/JUCE/Projucer.app/Contents/MacOS/Projucer --resave Artifact.jucer
          echo "=== Builds folder contents ==="
          ls -la Builds/ || echo "No Builds folder found"

      - name: Build VST3 and AU
        run: |
          # Find the xcodeproj regardless of folder name
          xcodeproj=$(find Builds -name "*.xcodeproj" | head -1)
          builddir=$(dirname "$xcodeproj")
          echo "Building: $xcodeproj"
          xcodebuild \
            -project "$xcodeproj" \
            -scheme "Artifact - All" \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            BUILD_DIR="$builddir/build" \
            build

      - name: Stage and package
        run: |
          builddir=$(find Builds -name "*.xcodeproj" | head -1 | xargs dirname)
          BUILD_OUT="$builddir/build/Release"
          echo "Looking for plugins in: $BUILD_OUT"
          find "$builddir/build" -name "*.vst3" -o -name "*.component" 2>/dev/null || true

          mkdir -p /tmp/artifact_stage/Library/Audio/Plug-Ins/VST3
          mkdir -p /tmp/artifact_stage/Library/Audio/Plug-Ins/Components

          vst3=$(find "$builddir/build" -name "Artifact.vst3" -type d | head -1)
          au=$(find "$builddir/build" -name "Artifact.component" -type d | head -1)

          [ -n "$vst3" ] && cp -r "$vst3" /tmp/artifact_stage/Library/Audio/Plug-Ins/VST3/
          [ -n "$au"   ] && cp -r "$au"   /tmp/artifact_stage/Library/Audio/Plug-Ins/Components/

          mkdir -p mac_output
          pkgbuild \
            --root /tmp/artifact_stage \
            --identifier "com.YourName.Artifact" \
            --version "1.0.0" \
            --install-location "/" \
            mac_output/Artifact_component.pkg

          productbuild \
            --package mac_output/Artifact_component.pkg \
            --version "1.0.0" \
            mac_output/Artifact_v1.0.0_macOS.pkg

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: mac_output/Artifact_v1.0.0_macOS.pkg
          if-no-files-found: warn

  # ── Linux Build ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux VST3
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libx11-dev libxinerama-dev libxext-dev \
            libfreetype6-dev libwebkit2gtk-4.0-dev libglu1-mesa-dev \
            libcurl4-openssl-dev libjack-jackd2-dev

      - name: Cache JUCE
        uses: actions/cache@v4
        id: cache-juce
        with:
          path: ~/JUCE
          key: juce-${{ env.JUCE_VERSION }}-linux

      - name: Download and extract JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L "https://github.com/juce-framework/JUCE/releases/download/${{ env.JUCE_VERSION }}/juce-${{ env.JUCE_VERSION }}-linux.zip" -o juce.zip
          unzip juce.zip -d ~/juce_extract
          extracted=$(ls ~/juce_extract | head -1)
          mv ~/juce_extract/"$extracted" ~/JUCE

      - name: Build Projucer
        run: |
          cd ~/JUCE/extras/Projucer/Builds/LinuxMakefile
          make CONFIG=Release -j$(nproc)

      - name: Resave project and list generated folders
        run: |
          ~/JUCE/extras/Projucer/Builds/LinuxMakefile/build/Projucer \
            --resave Artifact.jucer
          echo "=== Builds folder contents ==="
          ls -la Builds/ || echo "No Builds folder"

      - name: Build VST3 Release
        run: |
          # Find the Makefile folder regardless of name
          makedir=$(find Builds -name "Makefile" | head -1 | xargs dirname)
          echo "Building in: $makedir"
          cd "$makedir"
          make CONFIG=Release -j$(nproc)

      - name: Package Linux tarball
        run: |
          STAGE="$GITHUB_WORKSPACE/linux_package"
          mkdir -p "$STAGE"
          vst3=$(find Builds -name "Artifact.vst3" -type d | head -1)
          standalone=$(find Builds -name "Artifact" -type f | head -1)
          [ -n "$vst3"       ] && cp -r "$vst3"       "$STAGE/"
          [ -n "$standalone" ] && cp    "$standalone"  "$STAGE/"
          cp installer/install_linux.sh "$STAGE/"
          chmod +x "$STAGE/install_linux.sh"
          tar -czf Artifact_v1.0.0_Linux.tar.gz -C "$STAGE" .

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: Artifact_v1.0.0_Linux.tar.gz
          if-no-files-found: warn

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Artifact ${{ github.ref_name }}"
          body: |
            ## Artifact ${{ github.ref_name }} — Digital Degradation Plugin

            | Platform | File | Format |
            |----------|------|--------|
            | Windows  | `Artifact_v*_Windows_Setup.exe` | VST3 installer |
            | macOS    | `Artifact_v*_macOS.pkg` | VST3 + AU installer |
            | Linux    | `Artifact_v*_Linux.tar.gz` | VST3 + install script |

            **Windows:** Run the `.exe`, rescan plugins in your DAW.
            **macOS:** Open the `.pkg`, rescan plugins in your DAW.
            **Linux:** Extract the `.tar.gz`, run `sudo ./install_linux.sh`.
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-installer/*.pkg
            artifacts/linux-package/*.tar.gz
