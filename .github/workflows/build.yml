name: Build and Release Artifact

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  JUCE_VERSION: "8.0.10"

jobs:
  # ── Windows Build ────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows VST3
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache JUCE
        uses: actions/cache@v4
        id: cache-juce
        with:
          path: C:\JUCE
          key: juce-${{ env.JUCE_VERSION }}-windows

      - name: Download and extract JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/juce-framework/JUCE/releases/download/${{ env.JUCE_VERSION }}/juce-${{ env.JUCE_VERSION }}-windows.zip"
          Invoke-WebRequest -Uri $url -OutFile juce.zip
          Expand-Archive juce.zip -DestinationPath C:\juce_extract
          $extracted = Get-ChildItem C:\juce_extract | Select-Object -First 1
          Move-Item $extracted.FullName C:\JUCE

      - name: Patch JUCE path in solution files
        shell: pwsh
        run: |
          # Replace local JUCE path with CI path in all project files
          $files = Get-ChildItem "${{ github.workspace }}\Builds" -Recurse -Include "*.vcxproj","*.props" -ErrorAction SilentlyContinue
          foreach ($f in $files) {
            $content = Get-Content $f.FullName -Raw -ErrorAction SilentlyContinue
            if ($content -match "JUCE") {
              $content = $content -replace 'C:\\Users\\[^\\]+\\[^;]+\\JUCE', 'C:\JUCE'
              $content = $content -replace '[A-Za-z]:\\[^;]*JUCE[^;\\]*', 'C:\JUCE'
              $content | Set-Content $f.FullName
            }
          }
          Write-Host "Patched JUCE paths in project files"

      - name: Build VST3 Release
        shell: pwsh
        run: |
          $sln = Get-ChildItem "${{ github.workspace }}\Builds" -Recurse -Filter "*.sln" | Select-Object -First 1
          if (-not $sln) { Write-Error "No .sln found in Builds/"; exit 1 }
          Write-Host "Building: $($sln.FullName)"
          msbuild $sln.FullName /p:Configuration=Release /p:Platform=x64 -maxcpucount

      - name: Find VST3 output
        shell: pwsh
        run: |
          $vst3 = Get-ChildItem "${{ github.workspace }}" -Recurse -Filter "Artifact.vst3" -Directory | Select-Object -First 1
          if ($vst3) { Write-Host "VST3 found: $($vst3.FullName)" }
          else { Write-Host "VST3 not found in expected location, checking Program Files..."
            $vst3 = Get-ChildItem "C:\Program Files\Common Files\VST3" -Filter "Artifact.vst3" -Directory -ErrorAction SilentlyContinue
            if ($vst3) { Write-Host "VST3 in Program Files: $($vst3.FullName)" }
          }

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          # Look for VST3 in build output or Program Files
          $vst3 = Get-ChildItem "${{ github.workspace }}" -Recurse -Filter "Artifact.vst3" -Directory | Select-Object -First 1
          if (-not $vst3) {
            $vst3 = Get-ChildItem "C:\Program Files\Common Files\VST3" -Filter "Artifact.vst3" -Directory -ErrorAction SilentlyContinue
          }
          if (-not $vst3) { Write-Error "Cannot find Artifact.vst3"; exit 1 }

          $buildDir = $vst3.Parent.FullName
          Write-Host "Using build dir: $buildDir"

          $issPath = "${{ github.workspace }}\installer\Artifact_Windows_Installer.iss"
          $content = Get-Content $issPath -Raw
          $content = $content -replace '#define SourceDir.*', "#define SourceDir `"$buildDir`""
          $content | Set-Content $issPath
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" $issPath

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: "${{ github.workspace }}\\installer\\Output\\*.exe"
          if-no-files-found: warn

  # ── macOS Build ──────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS VST3 + AU
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache JUCE
        uses: actions/cache@v4
        id: cache-juce
        with:
          path: ~/JUCE
          key: juce-${{ env.JUCE_VERSION }}-macos

      - name: Download and extract JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L "https://github.com/juce-framework/JUCE/releases/download/${{ env.JUCE_VERSION }}/juce-${{ env.JUCE_VERSION }}-osx.zip" -o juce.zip
          unzip juce.zip -d ~/juce_extract
          extracted=$(ls ~/juce_extract | head -1)
          mv ~/juce_extract/"$extracted" ~/JUCE

      - name: Generate Xcode project via Projucer
        run: |
          # Patch the jucer file - print it first to find the right attribute
          echo "=== JUCE-related lines in Artifact.jucer ==="
          grep -i "juce\|folder\|path\|module" Artifact.jucer | head -20 || true

          # Try both common attribute names
          sed -i '' 's|juceFolder="[^"]*"|juceFolder="'"$HOME"'/JUCE"|g' Artifact.jucer || true
          sed -i '' 's|path="[^"]*JUCE[^"]*"|path="'"$HOME"'/JUCE"|g' Artifact.jucer || true

          ~/JUCE/Projucer.app/Contents/MacOS/Projucer --resave Artifact.jucer || true
          echo "=== Builds folder ==="
          ls -la Builds/ || echo "No Builds folder - Projucer may have failed"

      - name: Build VST3 and AU
        run: |
          xcodeproj=$(find . -name "*.xcodeproj" | grep -v JUCE | head -1)
          if [ -z "$xcodeproj" ]; then echo "ERROR: no xcodeproj found"; exit 1; fi
          builddir=$(dirname "$xcodeproj")
          echo "Building: $xcodeproj"
          xcodebuild \
            -project "$xcodeproj" \
            -scheme "Artifact - All" \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            BUILD_DIR="$builddir/build" \
            build

      - name: Stage and package
        run: |
          mkdir -p /tmp/artifact_stage/Library/Audio/Plug-Ins/VST3
          mkdir -p /tmp/artifact_stage/Library/Audio/Plug-Ins/Components

          vst3=$(find . -name "Artifact.vst3" -type d | grep -v JUCE | head -1)
          au=$(find   . -name "Artifact.component" -type d | grep -v JUCE | head -1)
          echo "VST3: $vst3"
          echo "AU:   $au"
          [ -n "$vst3" ] && cp -r "$vst3" /tmp/artifact_stage/Library/Audio/Plug-Ins/VST3/
          [ -n "$au"   ] && cp -r "$au"   /tmp/artifact_stage/Library/Audio/Plug-Ins/Components/

          mkdir -p mac_output
          pkgbuild \
            --root /tmp/artifact_stage \
            --identifier "com.YourName.Artifact" \
            --version "1.0.0" \
            --install-location "/" \
            mac_output/Artifact_component.pkg
          productbuild \
            --package mac_output/Artifact_component.pkg \
            --version "1.0.0" \
            mac_output/Artifact_v1.0.0_macOS.pkg

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: mac_output/Artifact_v1.0.0_macOS.pkg
          if-no-files-found: warn

  # ── Linux Build ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux VST3
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libx11-dev libxinerama-dev libxext-dev \
            libfreetype6-dev libwebkit2gtk-4.0-dev libglu1-mesa-dev \
            libcurl4-openssl-dev libjack-jackd2-dev

      - name: Cache JUCE
        uses: actions/cache@v4
        id: cache-juce
        with:
          path: ~/JUCE
          key: juce-${{ env.JUCE_VERSION }}-linux

      - name: Download and extract JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L "https://github.com/juce-framework/JUCE/releases/download/${{ env.JUCE_VERSION }}/juce-${{ env.JUCE_VERSION }}-linux.zip" -o juce.zip
          unzip juce.zip -d ~/juce_extract
          extracted=$(ls ~/juce_extract | head -1)
          mv ~/juce_extract/"$extracted" ~/JUCE

      - name: Build Projucer and generate Makefile project
        run: |
          cd ~/JUCE/extras/Projucer/Builds/LinuxMakefile
          make CONFIG=Release -j$(nproc)

          # Print jucer file to find path attribute
          echo "=== JUCE-related lines in Artifact.jucer ==="
          grep -i "juce\|folder\|path\|module" "$GITHUB_WORKSPACE/Artifact.jucer" | head -20 || true

          # Patch both common attribute names
          cd "$GITHUB_WORKSPACE"
          sed -i 's|juceFolder="[^"]*"|juceFolder="'"$HOME"'/JUCE"|g' Artifact.jucer || true
          sed -i 's|path="[^"]*JUCE[^"]*"|path="'"$HOME"'/JUCE"|g' Artifact.jucer || true

          ~/JUCE/extras/Projucer/Builds/LinuxMakefile/build/Projucer --resave Artifact.jucer || true
          echo "=== Builds folder ==="
          ls -la Builds/ || echo "No Builds folder"

      - name: Build VST3 Release
        run: |
          makedir=$(find Builds -name "Makefile" | head -1 | xargs -I{} dirname {} 2>/dev/null)
          if [ -z "$makedir" ]; then echo "ERROR: no Makefile found"; exit 1; fi
          echo "Building in: $makedir"
          cd "$makedir"
          make CONFIG=Release -j$(nproc)

      - name: Package Linux tarball
        run: |
          STAGE="$GITHUB_WORKSPACE/linux_package"
          mkdir -p "$STAGE"
          vst3=$(find . -name "Artifact.vst3" -type d | grep -v JUCE | head -1)
          [ -n "$vst3" ] && cp -r "$vst3" "$STAGE/"
          cp installer/install_linux.sh "$STAGE/"
          chmod +x "$STAGE/install_linux.sh"
          tar -czf Artifact_v1.0.0_Linux.tar.gz -C "$STAGE" .

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: Artifact_v1.0.0_Linux.tar.gz
          if-no-files-found: warn

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Artifact ${{ github.ref_name }}"
          body: |
            ## Artifact ${{ github.ref_name }} - Digital Degradation Plugin

            | Platform | File | Format |
            |----------|------|--------|
            | Windows  | Artifact_v*_Windows_Setup.exe | VST3 installer |
            | macOS    | Artifact_v*_macOS.pkg | VST3 + AU installer |
            | Linux    | Artifact_v*_Linux.tar.gz | VST3 + install script |

            **Windows:** Run the .exe, rescan plugins in your DAW.
            **macOS:** Open the .pkg, rescan plugins in your DAW.
            **Linux:** Extract the .tar.gz, run sudo ./install_linux.sh.
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-installer/*.pkg
            artifacts/linux-package/*.tar.gz
