name: Build and Release Artifact

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  JUCE_VERSION: "8.0.10"
  PLUGIN_NAME: "Artifact"

jobs:
  # ── Windows Build ────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows VST3
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache JUCE
        uses: actions/cache@v4
        id: cache-juce
        with:
          path: C:\JUCE
          key: juce-${{ env.JUCE_VERSION }}-windows

      - name: Download and extract JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/juce-framework/JUCE/releases/download/${{ env.JUCE_VERSION }}/juce-${{ env.JUCE_VERSION }}-windows.zip"
          Invoke-WebRequest -Uri $url -OutFile juce.zip
          Expand-Archive juce.zip -DestinationPath C:\juce_extract
          $extracted = Get-ChildItem C:\juce_extract | Select-Object -First 1
          Move-Item $extracted.FullName C:\JUCE

      - name: Build Projucer and resave project
        shell: pwsh
        run: |
          cd C:\JUCE\extras\Projucer\Builds\VisualStudio2022
          msbuild Projucer.sln /p:Configuration=Release /p:Platform=x64 -maxcpucount
          $projucer = "C:\JUCE\extras\Projucer\Builds\VisualStudio2022\x64\Release\App\Projucer.exe"
          & $projucer --resave "${{ github.workspace }}\Artifact.jucer"

      - name: Build VST3 Release
        shell: pwsh
        run: |
          cd "${{ github.workspace }}\Builds\VisualStudio2022"
          msbuild Artifact.sln /p:Configuration=Release /p:Platform=x64 -maxcpucount

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $issPath = "${{ github.workspace }}\installer\Artifact_Windows_Installer.iss"
          $content = Get-Content $issPath -Raw
          $buildPath = "${{ github.workspace }}\Builds\VisualStudio2022\x64\Release"
          $content = $content -replace '#define SourceDir.*', "#define SourceDir `"$buildPath`""
          $content | Set-Content $issPath
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" $issPath

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: "${{ github.workspace }}\\installer\\Output\\*.exe"

  # ── macOS Build ──────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS VST3 + AU
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache JUCE
        uses: actions/cache@v4
        id: cache-juce
        with:
          path: ~/JUCE
          key: juce-${{ env.JUCE_VERSION }}-macos

      - name: Download and extract JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L "https://github.com/juce-framework/JUCE/releases/download/${{ env.JUCE_VERSION }}/juce-${{ env.JUCE_VERSION }}-osx.zip" -o juce.zip
          unzip juce.zip -d ~/juce_extract
          extracted=$(ls ~/juce_extract | head -1)
          mv ~/juce_extract/"$extracted" ~/JUCE

      - name: Generate Xcode project
        run: |
          ~/JUCE/Projucer.app/Contents/MacOS/Projucer --resave Artifact.jucer

      - name: Stage plugin files
        run: |
          BUILD_DIR="Builds/MacOSX/build/Release"
          mkdir -p /tmp/artifact_stage/Library/Audio/Plug-Ins/VST3
          mkdir -p /tmp/artifact_stage/Library/Audio/Plug-Ins/Components
          if [ -d "$BUILD_DIR/VST3/Artifact.vst3" ]; then
            cp -r "$BUILD_DIR/VST3/Artifact.vst3" /tmp/artifact_stage/Library/Audio/Plug-Ins/VST3/
          fi
          if [ -d "$BUILD_DIR/AU/Artifact.component" ]; then
            cp -r "$BUILD_DIR/AU/Artifact.component" /tmp/artifact_stage/Library/Audio/Plug-Ins/Components/
          fi

      - name: Build VST3 and AU
        run: |
          cd Builds/MacOSX
          xcodebuild \
            -project Artifact.xcodeproj \
            -scheme "Artifact - All" \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            BUILD_DIR=build \
            build

      - name: Build macOS pkg
        run: |
          OUTPUT_DIR="$GITHUB_WORKSPACE/mac_output"
          mkdir -p "$OUTPUT_DIR"
          pkgbuild \
            --root /tmp/artifact_stage \
            --identifier "com.YourName.Artifact" \
            --version "1.0.0" \
            --install-location "/" \
            "$OUTPUT_DIR/Artifact_component.pkg"
          productbuild \
            --package "$OUTPUT_DIR/Artifact_component.pkg" \
            --version "1.0.0" \
            "$OUTPUT_DIR/Artifact_v1.0.0_macOS.pkg"

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: "${{ github.workspace }}/mac_output/Artifact_v1.0.0_macOS.pkg"

  # ── Linux Build ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux VST3
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libx11-dev libxinerama-dev libxext-dev \
            libfreetype6-dev libwebkit2gtk-4.0-dev libglu1-mesa-dev \
            libcurl4-openssl-dev libjack-jackd2-dev

      - name: Cache JUCE
        uses: actions/cache@v4
        id: cache-juce
        with:
          path: ~/JUCE
          key: juce-${{ env.JUCE_VERSION }}-linux

      - name: Download and extract JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L "https://github.com/juce-framework/JUCE/releases/download/${{ env.JUCE_VERSION }}/juce-${{ env.JUCE_VERSION }}-linux.zip" -o juce.zip
          unzip juce.zip -d ~/juce_extract
          extracted=$(ls ~/juce_extract | head -1)
          mv ~/juce_extract/"$extracted" ~/JUCE

      - name: Build Projucer
        run: |
          cd ~/JUCE/extras/Projucer/Builds/LinuxMakefile
          make CONFIG=Release -j$(nproc)

      - name: Generate Makefile project
        run: |
          ~/JUCE/extras/Projucer/Builds/LinuxMakefile/build/Projucer \
            --resave Artifact.jucer

      - name: Build VST3 Release
        run: |
          cd Builds/LinuxMakefile
          make CONFIG=Release -j$(nproc)

      - name: Package Linux tarball
        run: |
          STAGE="$GITHUB_WORKSPACE/linux_package"
          BUILD="Builds/LinuxMakefile/build"
          mkdir -p "$STAGE"
          [ -d "$BUILD/Artifact.vst3" ] && cp -r "$BUILD/Artifact.vst3" "$STAGE/"
          [ -f "$BUILD/Artifact" ]      && cp "$BUILD/Artifact" "$STAGE/"
          cp installer/install_linux.sh "$STAGE/"
          chmod +x "$STAGE/install_linux.sh"
          tar -czf Artifact_v1.0.0_Linux.tar.gz -C "$STAGE" .

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: "${{ github.workspace }}/Artifact_v1.0.0_Linux.tar.gz"

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Artifact ${{ github.ref_name }}"
          body: |
            ## Artifact ${{ github.ref_name }} — Digital Degradation Plugin

            | Platform | File | Format |
            |----------|------|--------|
            | Windows  | `Artifact_v*_Windows_Setup.exe` | VST3 installer |
            | macOS    | `Artifact_v*_macOS.pkg` | VST3 + AU installer |
            | Linux    | `Artifact_v*_Linux.tar.gz` | VST3 + install script |

            **Windows:** Run the `.exe`, rescan plugins in your DAW.
            **macOS:** Open the `.pkg`, rescan plugins in your DAW.
            **Linux:** Extract the `.tar.gz`, run `sudo ./install_linux.sh`.
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-installer/*.pkg
            artifacts/linux-package/*.tar.gz
